<!DOCTYPE html>
<html lang="th">
<head>
  <link rel="manifest" href="/manifest-health.json">
  <meta name="theme-color" content="#155263">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>📋 รายการคำร้อง - สาธารณสุข</title>

  <style>
    body { font-family: 'Kanit', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
    h2 { text-align: center; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 0 8px rgba(0,0,0,0.1); }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: center; vertical-align: middle; }
    th { background: #15563b; color: white; }
    img, video { max-width: 100%; max-height: 300px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
    .media-container { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 10px 0; }
    a.map-link { color: #2563eb; font-weight: bold; text-decoration: none; }
    .btn { padding:10px 14px; border-radius:8px; border:1px solid #cbd5e1; background:#fff; font-weight:600; cursor:pointer; }
    .btn.primary { border-color:#15563b; background:#15563b; color:#fff; }
    .btn.danger  { border-color:#dc2626; background:#fee2e2; color:#b91c1c; }
    .chip { display:inline-block; padding:6px 10px; border-radius:999px; font-weight:700; font-size:13px; }
    .chip.inbox { background:#e0f2fe; color:#075985; border:1px solid #7dd3fc; }
    .chip.work  { background:#dcfce7; color:#166534; border:1px solid #86efac; }
  </style>
</head>

<body>
  <h2>📋 รายการคำร้อง - สาธารณสุข</h2>

  <!-- ✅ โหมดสลับ: กล่องรับเรื่อง / งานของแผนก -->
  <div style="text-align:center; margin:-6px 0 14px;">
    <button id="btn-inbox" class="btn" onclick="setView('inbox')"
      style="margin-right:6px; border-color:#0284c7; background:#e0f2fe; color:#075985;">
      📥 กล่องรับเรื่อง (0)
    </button>

    <button id="btn-work" class="btn" onclick="setView('work')"
      style="border-color:#15563b; background:#dcfce7; color:#166534;">
      📋 งานของแผนก
    </button>

    <div style="margin-top:10px; color:#334155; font-weight:700;">
      โหมด: <span id="modeBadge" class="chip inbox">📥 กล่องรับเรื่อง</span>
    </div>
  </div>

  <div style="text-align:center; margin-bottom: 20px;">
    <input type="text" id="searchInput" placeholder="🔎 ค้นหาชื่อหรือเบอร์..." oninput="filterByName()" style="
      padding: 10px;
      width: 300px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    " />
  </div>

  <div style="display:flex; justify-content:center; align-items:center; gap:10px; flex-wrap:wrap; margin:-8px 0 14px;">
    <div style="color:#334155; font-weight:600;">
      🔄 อัปเดตล่าสุด: <span id="last-updated">-</span>
    </div>

    <label style="display:flex; align-items:center; gap:6px; color:#334155; font-weight:600;">
      <input type="checkbox" id="auto-refresh-toggle" checked />
      รีเฟรชอัตโนมัติ
    </label>
  </div>

  <div style="text-align:center; margin:-8px 0 16px;">
    <button id="btn-unset" onclick="location.href='unset-health.html'"
            style="display:none; padding:10px 14px; border-radius:8px; border:1px solid #eab308; background:#fff8e1; color:#92400e; font-weight:600; cursor:pointer; margin-right:6px;">
      📝 ยังไม่ได้เลือกสถานะ (0)
    </button>

    <button id="btn-pending" onclick="location.href='pending-health.html'"
            style="padding:10px 14px; border-radius:8px; border:1px solid #cbd5e1; background:#fff; font-weight:600; cursor:pointer;">
      ⏳ รอดำเนินการ (0)
    </button>

    <button id="btn-inprogress" onclick="location.href='inprogress-health.html'"
            style="padding:10px 14px; border-radius:8px; border:1px solid #cbd5e1; background:#fff; font-weight:600; cursor:pointer; margin-left:6px;">
      ⚙️ กำลังดำเนินการ (0)
    </button>

    <button id="btn-completed" onclick="location.href='completed-health.html'"
            style="padding:10px 14px; border-radius:8px; border:1px solid #cbd5e1; background:#fff; font-weight:600; cursor:pointer; margin-left:6px;">
      ✅ เสร็จสิ้น (0)
    </button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ชื่อ</th><th>เบอร์</th><th>ข้อความ</th><th>ไฟล์</th><th>แผนก</th><th>สถานะ/จัดการ</th><th>แผนที่</th><th>วันที่-เวลา</th><th>ไฟล์(เสร็จสิ้น)</th>
      </tr>
    </thead>
    <tbody id="data-body"></tbody>
  </table>

  <!-- ✅ Pagination -->
  <div id="pagination"
       style="margin-top:10px; display:flex; justify-content:center; align-items:center; gap:8px;">
    <button id="prevPage" onclick="changePage(-1)"
            style="padding:6px 12px; border-radius:6px; border:1px solid #cbd5e1; cursor:pointer;">
      ก่อนหน้า
    </button>
    <span id="pageInfo">หน้า 1 จาก 1</span>
    <button id="nextPage" onclick="changePage(1)"
            style="padding:6px 12px; border-radius:6px; border:1px solid #cbd5e1; cursor:pointer;">
      ถัดไป
    </button>
  </div>

  <script>
    const DEPT = 'สาธารณสุข';

    // ✅ โหมดหน้า (inbox / work)
    let VIEW_MODE = 'inbox'; // ค่าเริ่มต้น

    // ====== pagination state ======
    let allHealthData = [];
    let filteredData = [];
    let currentPage = 1;
    const pageSize = 20;

    function setModeBadge() {
      const badge = document.getElementById('modeBadge');
      if (!badge) return;

      if (VIEW_MODE === 'inbox') {
        badge.className = 'chip inbox';
        badge.textContent = '📥 กล่องรับเรื่อง';
      } else {
        badge.className = 'chip work';
        badge.textContent = '📋 งานของแผนก';
      }
    }

    async function setView(mode) {
      VIEW_MODE = mode === 'work' ? 'work' : 'inbox';
      currentPage = 1;

      // อัปเดตปุ่มให้ดูเหมือนเลือกอยู่
      const btnInbox = document.getElementById('btn-inbox');
      const btnWork  = document.getElementById('btn-work');

      if (btnInbox && btnWork) {
        if (VIEW_MODE === 'inbox') {
          btnInbox.style.opacity = '1';
          btnWork.style.opacity  = '0.65';
        } else {
          btnWork.style.opacity  = '1';
          btnInbox.style.opacity = '0.65';
        }
      }

      setModeBadge();
      await safeLoadData();
    }

    function getEndpointForMode() {
      // ✅ inbox: เฉพาะรายการรอรับเรื่อง
      if (VIEW_MODE === 'inbox') return '/data-health-inbox';
      // ✅ work: รายการทั้งหมดของสาธารณสุข (เดิม)
      return '/data-health-all';
    }

    async function loadData() {
      const keyword = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
      const prevPage = currentPage;

      const endpoint = getEndpointForMode();
      const res = await fetch(endpoint + '?_=' + Date.now());
      const data = await res.json();

      allHealthData = Array.isArray(data) ? data : [];

      // ถ้ามีการค้นหาอยู่ ให้กรองเหมือนเดิม
      if (keyword) {
        filteredData = allHealthData.filter(row =>
          (row.name && String(row.name).toLowerCase().includes(keyword)) ||
          (row.phone && String(row.phone).toLowerCase().includes(keyword))
        );
      } else {
        filteredData = allHealthData;
      }

      // คงหน้าที่อยู่
      currentPage = prevPage;
      renderCurrentPage();
    }

    function renderCurrentPage() {
      const totalItems = filteredData.length;
      const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
      if (currentPage > totalPages) currentPage = totalPages;

      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageData = filteredData.slice(start, end);

      renderTable(pageData);

      const info = document.getElementById('pageInfo');
      if (info) info.textContent = `หน้า ${currentPage} จาก ${totalPages} (ทั้งหมด ${totalItems} รายการ)`;

      const prevBtn = document.getElementById('prevPage');
      const nextBtn = document.getElementById('nextPage');
      if (prevBtn) prevBtn.disabled = currentPage === 1;
      if (nextBtn) nextBtn.disabled = currentPage === totalPages;
    }

    function changePage(delta) {
      currentPage += delta;
      renderCurrentPage();
    }

    function filterByName() {
      isTyping = true;
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => { isTyping = false; }, 800);

      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

      filteredData = allHealthData.filter(row =>
        (row.name && String(row.name).toLowerCase().includes(keyword)) ||
        (row.phone && String(row.phone).toLowerCase().includes(keyword))
      );

      currentPage = 1;
      renderCurrentPage();
    }

    function renderTable(data) {
      const tbody = document.getElementById('data-body');
      tbody.innerHTML = '';

      data.forEach(row => {
        let files = [];
        try {
          if (row.photo && typeof row.photo === 'string') files = JSON.parse(row.photo);
          else if (Array.isArray(row.photo)) files = row.photo;
        } catch (e) { files = []; }

        const completedFiles = files.filter(it => {
          if (!it || typeof it !== 'object') return false;
          return it.from === 'completed' || it.tag === 'completed';
        });

        const mainFiles = files.filter(it => {
          if (!it) return false;
          if (typeof it !== 'object') return true;
          return !(it.from === 'completed' || it.tag === 'completed');
        });

        // คอลัมน์ไฟล์เสร็จสิ้น
        let completedLinks = "-";
        if (completedFiles.length > 0) {
          const cf = completedFiles[0];
          const cfUrl = typeof cf === 'string'
            ? (cf.startsWith('uploads/') ? `/${cf}` : cf)
            : ((cf.url || '').startsWith('uploads/') ? `/${cf.url}` : (cf.url || ''));

          const cfBtn = `
            <button style="margin-top:10px; padding:6px 12px; border:1px solid #999; border-radius:6px; background:#fff; font-weight:bold; cursor:pointer;"
                    onclick='showImages(${JSON.stringify(completedFiles)})'>
              ดูทั้งหมด
            </button>`;

          completedLinks = `
            <div class="media-container">
              ${cfBtn}
              <button onclick="deleteCompletedFile(${row.id}, '${cfUrl}')"
                style="margin-top:6px; padding:6px 12px; border:1px solid #dc2626;
                       background:#fee2e2; color:#b91c1c; border-radius:6px; cursor:pointer;">
                🗑 ลบไฟล์นี้
              </button>
            </div>
          `;
        }

        // คอลัมน์ไฟล์หลัก
        let fileLinks = "-";
        if (mainFiles.length > 0) {
          const buttonHtml =
            `<button style="margin-top:10px; padding:6px 12px; border:1px solid #999; border-radius:6px; background:#fff; font-weight:bold; cursor:pointer;"
                    onclick='showImages(${JSON.stringify(mainFiles)})'>ดูทั้งหมด</button>`;
          fileLinks = `<div class="media-container">${buttonHtml}</div>`;
        }

        const mapLink = (row.latitude && row.longitude)
          ? `<a class="map-link" href="https://www.google.com/maps?q=${row.latitude},${row.longitude}" target="_blank">📍 แผนที่</a>`
          : '-';

        // ✅ คอลัมน์สถานะ/จัดการ: เปลี่ยนตามโหมด
        let statusCellHtml = '-';

        if (VIEW_MODE === 'inbox') {
          // โหมดกล่องรับเรื่อง: มีปุ่มรับ/ไม่รับ
          statusCellHtml = `
            <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
              <div style="font-weight:800; color:#075985;">รอแผนกรับเรื่อง</div>
              <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center;">
                <button class="btn primary" onclick="acceptDept(${row.id})">✅ รับเรื่อง</button>
                <button class="btn danger" onclick="rejectDept(${row.id})">❌ ไม่รับ</button>
              </div>
              <div style="font-size:12px; color:#64748b;">
                ถ้ารับเรื่อง ระบบจะย้ายไป “งานของแผนก”
              </div>
            </div>
          `;
        } else {
          // โหมดงานของแผนก: ใช้ select เดิม
          const statusSelect = `
            <select onchange="onStatusChange(${row.id}, this.value)">
              <option value="" disabled ${(row.status === null || row.status === undefined || row.status === '') ? 'selected' : ''}>โปรดเลือกสถานะ</option>
              <option value="รอดำเนินการ" ${row.status === 'รอดำเนินการ' ? 'selected' : ''}>รอดำเนินการ</option>
              <option value="กำลังดำเนินการ" ${row.status === 'กำลังดำเนินการ' ? 'selected' : ''}>กำลังดำเนินการ</option>
              <option value="เสร็จสิ้น" ${row.status === 'เสร็จสิ้น' ? 'selected' : ''}>เสร็จสิ้น</option>
            </select>
          `;
          statusCellHtml = statusSelect;
        }

        tbody.innerHTML += `
          <tr id="row-${row.id}">
            <td>${row.name || '-'}</td>
            <td>${row.phone || '-'}</td>
            <td>${row.message || '-'}</td>
            <td>${fileLinks || '-'}</td>
            <td>${row.department || '-'}</td>
            <td>${statusCellHtml}</td>
            <td>${mapLink}</td>
            <td>${formatDate(row.completed_at || row.created_at)}</td>
            <td>${completedLinks || '-'}</td>
          </tr>
        `;
      });
    }

    function formatDate(dateString) {
      if (!dateString) return 'ไม่ทราบเวลา';
      const d = new Date(dateString);
      if (isNaN(d)) return 'ไม่สามารถแปลงเวลาได้';
      return d.toLocaleString('th-TH', {
        timeZone: 'Asia/Bangkok',
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
      });
    }

    function showImages(images) {
      const html = images.map(img => {
        const url = typeof img === 'string'
          ? (img.startsWith('uploads/') ? `/${img}` : img)
          : ((img.url || '').startsWith('uploads/') ? `/${img.url}` : (img.url || ''));
        const type = (typeof img === 'string') ? "" : (img.type || "");
        if (type === 'video' || url.toLowerCase().match(/\.(mp4|mov|avi)(\?|$)/)) {
          return `<video controls style="width:auto;max-width:700px;max-height:500px;margin-bottom:20px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.2);"><source src="${url}" type="video/mp4"></video>`;
        }
        return `<img src="${url}" style="width:auto;max-width:700px;max-height:500px;margin-bottom:20px;border-radius:8px;object-fit:contain;box-shadow:0 2px 6px rgba(0,0,0,.2);" />`;
      }).join('');

      const win = window.open('', '_blank', 'width=800,height=600');
      win.document.write(`<body style="font-family:kanit; padding:30px; text-align:center; background:#f9f9f9">${html}</body>`);
    }

    // ✅ ใหม่: รับเรื่อง / ไม่รับเรื่อง (ใช้ API ที่คุณเพิ่มใน server.js แล้ว)
    async function acceptDept(id) {
      if (!confirm('ยืนยันรับเรื่องนี้ใช่ไหม?')) return;
      const res = await fetch(`/dept-accept/${id}`, { method: 'POST' });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.ok) {
        alert('✅ รับเรื่องแล้ว (ย้ายไปงานของแผนก)');
        // หลังรับเรื่อง ให้ไปโหมดงานของแผนกทันที
        await setView('work');
        await updateCounters();
      } else {
        alert('❌ รับเรื่องไม่สำเร็จ');
      }
    }

    async function rejectDept(id) {
      const reason = prompt('❌ ไม่รับเรื่องเพราะอะไร? (ใส่หรือเว้นว่างได้)');
      if (reason === null) return;

      const res = await fetch(`/dept-reject/${id}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason })
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.ok) {
        alert('✅ ส่งกลับแอดมินหลักแล้ว');
        await safeLoadData();
        await updateCounters();
      } else {
        alert('❌ ส่งกลับไม่สำเร็จ');
      }
    }

    async function setStatus(id, status) {
      const res = await fetch(`/set-status/${id}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });

      if (res.ok) {
        alert('อัปเดตสถานะเรียบร้อย');
        await safeLoadData();
        if (typeof updateCounters === 'function') updateCounters();
      } else {
        alert('เกิดข้อผิดพลาดในการอัปเดต');
      }
    }

    // ====== counters ======
    async function updateCounters() {
      try {
        const [inboxRes, allRes, pRes, iRes, cRes] = await Promise.all([
          fetch('/data-health-inbox?_=' + Date.now()),
          fetch('/data-health-all?_=' + Date.now()),
          fetch('/data-pending?department=' + encodeURIComponent(DEPT) + '&_=' + Date.now()),
          fetch('/data-in-progress?department=' + encodeURIComponent(DEPT) + '&_=' + Date.now()),
          fetch('/data-completed?department=' + encodeURIComponent(DEPT) + '&_=' + Date.now()),
        ]);

        const [inboxData, allData, pAll, iAll, cAll] = await Promise.all([
          inboxRes.json(), allRes.json(), pRes.json(), iRes.json(), cRes.json()
        ]);

        // ✅ inbox count
        const inboxCount = Array.isArray(inboxData) ? inboxData.length : 0;
        const btnInbox = document.getElementById('btn-inbox');
        if (btnInbox) btnInbox.textContent = `📥 กล่องรับเรื่อง (${inboxCount})`;

        const byDept = (r) => ((r.department || '').trim() === DEPT);

        const unset      = (Array.isArray(allData) ? allData : []).filter(r => byDept(r) && (!r.status || String(r.status).trim()==='')).length;
        const pending    = Array.isArray(pAll) ? pAll.length : 0;
        const inProgress = Array.isArray(iAll) ? iAll.length : 0;
        const completed  = Array.isArray(cAll) ? cAll.length : 0;

        document.getElementById('btn-unset').textContent      = `📝 ยังไม่ได้เลือกสถานะ (${unset})`;
        document.getElementById('btn-pending').textContent    = `⏳ รอดำเนินการ (${pending})`;
        document.getElementById('btn-inprogress').textContent = `⚙️ กำลังดำเนินการ (${inProgress})`;
        document.getElementById('btn-completed').textContent  = `✅ เสร็จสิ้น (${completed})`;
      } catch (err) {
        console.error('Error updating counters:', err);
      }
    }

    // ====== auto refresh table ======
    let autoTimer = null;
    let isLoading = false;

    let isTyping = false;
    let typingTimer = null;

    function setLastUpdated() {
      const now = new Date();
      const el = document.getElementById('last-updated');
      if (el) {
        el.textContent = now.toLocaleString('th-TH', { dateStyle: 'short', timeStyle: 'medium' });
      }
    }

    async function safeLoadData() {
      if (isLoading) return;
      isLoading = true;
      try {
        await loadData();
        setLastUpdated();
      } catch (e) {
        console.error('Auto refresh error:', e);
      } finally {
        isLoading = false;
      }
    }

    function startAutoRefresh(ms = 15000) {
      stopAutoRefresh();
      autoTimer = setInterval(() => {
        const toggle = document.getElementById('auto-refresh-toggle');
        if ((!toggle || toggle.checked) && !isTyping) safeLoadData();
      }, ms);
    }

    function stopAutoRefresh() {
      if (autoTimer) clearInterval(autoTimer);
      autoTimer = null;
    }

    // init
    setModeBadge();
    setView('inbox'); // เริ่มที่ inbox
    updateCounters();

    startAutoRefresh(15000);
    setInterval(updateCounters, 60000);

    window.addEventListener('load', () => {
      const toggle = document.getElementById('auto-refresh-toggle');
      if (toggle) {
        toggle.addEventListener('change', () => {
          if (toggle.checked) startAutoRefresh(15000);
          else stopAutoRefresh();
        });
      }
    });
  </script>

  <!-- ✅ Modal แนบไฟล์ตอน "เสร็จสิ้น" -->
  <div id="completeModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#fff; width:95%; max-width:520px; border-radius:14px; padding:18px; box-shadow:0 10px 30px rgba(0,0,0,.2);">
      <h3 style="margin:0 0 8px">แนบรูป/วิดีโอ (ไม่บังคับ)</h3>
      <p style="margin:0 0 12px; color:#555">คุณตั้งค่าสถานะเป็น “เสร็จสิ้น” ต้องการแนบรูป/วิดีโอเพิ่มเพื่อยืนยันผลการดำเนินงานหรือไม่?</p>

      <input id="completeFiles" type="file" multiple accept="image/*,video/*" style="display:block; margin-bottom:14px">

      <div style="display:flex; gap:8px; justify-content:flex-end">
        <button onclick="closeCompleteModal()" class="btn">ยกเลิก</button>
        <button id="btnCompleteUpload" onclick="submitComplete()" class="btn primary">ยืนยัน</button>
      </div>
    </div>
  </div>

  <script>
    let pendingCompleteId = null;

    function onStatusChange(id, value) {
      if (value === 'เสร็จสิ้น') {
        pendingCompleteId = id;
        openCompleteModal();
      } else {
        setStatus(id, value);
      }
    }

    function openCompleteModal() {
      document.getElementById('completeModal').style.display = 'flex';
      stopAutoRefresh();
    }
    function closeCompleteModal() {
      document.getElementById('completeModal').style.display = 'none';
      document.getElementById('completeFiles').value = '';
      pendingCompleteId = null;
      startAutoRefresh(15000);
    }

    async function submitComplete() {
      if (!pendingCompleteId) return;

      const btn = document.getElementById('btnCompleteUpload');
      btn.disabled = true;
      btn.textContent = 'กำลังอัปโหลด...';

      try {
        const fd = new FormData();
        const files = document.getElementById('completeFiles').files;
        for (const f of files) fd.append('extraFiles', f);

        const res = await fetch(`/complete-with-media/${pendingCompleteId}`, {
          method: 'POST',
          body: fd
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.success === false) {
          alert(data.message || '❌ อัปโหลดไม่สำเร็จ');
        } else {
          alert('✅ อัปเดตเป็น "เสร็จสิ้น" และแนบไฟล์เรียบร้อย');
          await safeLoadData();
          await updateCounters();
        }
      } catch (err) {
        console.error(err);
        alert('❌ เกิดข้อผิดพลาดในการอัปโหลด');
      } finally {
        btn.disabled = false;
        btn.textContent = 'ยืนยัน';
        closeCompleteModal();
      }
    }

    async function deleteCompletedFile(id, fileUrl) {
      if (!confirm('แน่ใจหรือไม่ว่าต้องการลบไฟล์นี้?')) return;

      try {
        const res = await fetch(`/delete-completed-file/${id}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fileUrl })
        });
        const data = await res.json();
        alert(data.message);
        if (data.success) await safeLoadData();
      } catch (err) {
        console.error(err);
        alert('❌ เกิดข้อผิดพลาดในการลบไฟล์');
      }
    }
  </script>

</body>
</html>
