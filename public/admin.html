<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>📋 ระบบจัดการคำร้อง (Admin)</title>

  <!-- ใช้ฟอนต์ชุดเดียวกับ admin-health -->
  <link rel="stylesheet" href="/admin-font.css" />

  <script>
  let isFirstLoadByMode = { all: true, today: true };
  let currentViewMode = 'all';
  let isLoading = false;
  let autoTimer = null;

  let rawData = [];
  let filteredData = [];
  let typingTimer = null;

  let currentDetailId = null;
  let currentRejectId = null;

  function getSeenKey() {
    return currentViewMode === 'today'
      ? 'admin_seen_ids_today_v1'
      : 'admin_seen_ids_all_v1';
  }

  function getSeenIds() {
    try {
      const raw = localStorage.getItem(getSeenKey());
      const arr = raw ? JSON.parse(raw) : [];
      return Array.isArray(arr) ? arr : [];
    } catch (e) {
      console.warn('อ่าน seen ids ไม่สำเร็จ:', e);
      return [];
    }
  }

  function saveSeenIds(ids) {
    try {
      localStorage.setItem(getSeenKey(), JSON.stringify(ids));
    } catch (e) {
      console.warn('บันทึก seen ids ไม่สำเร็จ:', e);
    }
  }

  function getActiveNewKey() {
    return currentViewMode === 'today'
      ? 'admin_active_new_ids_today_v1'
      : 'admin_active_new_ids_all_v1';
  }

  function getActiveNewIds() {
    try {
      const raw = localStorage.getItem(getActiveNewKey());
      const arr = raw ? JSON.parse(raw) : [];
      return Array.isArray(arr) ? arr.map(Number).filter(Boolean) : [];
    } catch (e) {
      console.warn('อ่าน active new ids ไม่สำเร็จ:', e);
      return [];
    }
  }

  function saveActiveNewIds(ids) {
    try {
      const unique = [...new Set(ids.map(Number).filter(Boolean))];
      localStorage.setItem(getActiveNewKey(), JSON.stringify(unique));
    } catch (e) {
      console.warn('บันทึก active new ids ไม่สำเร็จ:', e);
    }
  }

  function removeFromActiveNewIds(id) {
    const target = Number(id);
    const allKey = 'admin_active_new_ids_all_v1';
    const todayKey = 'admin_active_new_ids_today_v1';

    [allKey, todayKey].forEach((key) => {
      try {
        const raw = localStorage.getItem(key);
        const arr = raw ? JSON.parse(raw) : [];
        const next = (Array.isArray(arr) ? arr : [])
          .map(Number)
          .filter(x => x && x !== target);

        localStorage.setItem(key, JSON.stringify([...new Set(next)]));
      } catch (e) {
        console.warn('ลบ active new id ไม่สำเร็จ:', e);
      }
    });
  }

  function updateNewBanner(count) {
    const el = document.getElementById('new-banner');
    if (!el) return;

    if (count > 0) {
      el.textContent = `🔔 มีคำร้องใหม่ ${count} รายการ`;
      el.classList.add('show');
    } else {
      el.textContent = '';
      el.classList.remove('show');
    }
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, (m) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[m]));
  }

  function resetSeenNewState() {
    localStorage.removeItem('admin_seen_ids_all_v1');
    localStorage.removeItem('admin_seen_ids_today_v1');
    localStorage.removeItem('admin_active_new_ids_all_v1');
    localStorage.removeItem('admin_active_new_ids_today_v1');
    isFirstLoadByMode = { all: true, today: true };
    updateNewBanner(0);
    alert('รีเซ็ตสถานะ "ข้อมูลใหม่" แล้ว');
    safeLoadData();
  }

  function updateViewModeUI() {
    const badge = document.getElementById('view-mode-badge');
    const btnAll = document.getElementById('btn-show-all');
    const btnToday = document.getElementById('btn-show-today');
    const totalSub = document.getElementById('kpiTotalSub');

    if (badge) {
      badge.textContent = currentViewMode === 'today'
        ? 'โหมด: คำร้องวันนี้'
        : 'โหมด: คำร้องใหม่ทั้งหมด';

      badge.classList.remove('mode-all', 'mode-today');
      badge.classList.add(currentViewMode === 'today' ? 'mode-today' : 'mode-all');
    }

    if (btnAll) {
      btnAll.classList.toggle('blue', currentViewMode === 'all');
      btnAll.classList.toggle('ghost', currentViewMode !== 'all');
    }

    if (btnToday) {
      btnToday.classList.toggle('blue', currentViewMode === 'today');
      btnToday.classList.toggle('ghost', currentViewMode !== 'today');
    }

    if (totalSub) {
      totalSub.textContent = currentViewMode === 'today' ? '/data-today' : '/data';
    }
  }

  async function setViewMode(mode) {
    currentViewMode = mode === 'today' ? 'today' : 'all';
    updateViewModeUI();
    await safeLoadData();
  }

  function setLastUpdated() {
    const now = new Date();
    const el = document.getElementById('last-updated');
    if (!el) return;
    el.textContent = now.toLocaleString('th-TH', {
      dateStyle: 'short',
      timeStyle: 'medium'
    });
  }

  function formatDate(dateString) {
    if (!dateString) return '-';
    const d = new Date(dateString);
    if (isNaN(d)) return '-';
    return d.toLocaleString('th-TH', {
      dateStyle: 'short',
      timeStyle: 'short'
    });
  }

  function normalizeFiles(row) {
    let files = [];
    try {
      if (row.photo && typeof row.photo === 'string') files = JSON.parse(row.photo);
      else if (Array.isArray(row.photo)) files = row.photo;
    } catch (e) {
      files = [];
    }
    return Array.isArray(files) ? files : [];
  }

  function normalizeFileUrl(item) {
    if (typeof item === 'string') return item.startsWith('uploads/') ? `/${item}` : item;
    const raw = item?.url || '';
    return raw.startsWith('uploads/') ? `/${raw}` : raw;
  }

  function isVideoFile(item) {
    const url = normalizeFileUrl(item).toLowerCase();
    const type = (typeof item === 'object' && item?.type) ? item.type : '';
    return type === 'video' || /\.(mp4|mov|avi|webm|m4v)(\?|$)/i.test(url);
  }

  function buildMapLink(row) {
    if (row.latitude && row.longitude) {
      const href = `https://www.google.com/maps?q=${row.latitude},${row.longitude}`;
      return `<a class="map-link" href="${href}" target="_blank" rel="noopener">📍 แผนที่</a>`;
    }
    return '-';
  }

  function calcKpis(rows, newCount) {
    const todayCount = rows.filter(r => {
      if (!r.created_at) return false;
      const d = new Date(r.created_at);
      if (isNaN(d)) return false;
      const now = new Date();
      const thDate = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Bangkok',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).format(d);
      const thNow = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Bangkok',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).format(now);
      return thDate === thNow;
    }).length;

    const bounceCount = rows.filter(r =>
      (r.status === 'รอแอดมินหลัก') || (Number(r.dept_accept) === 0)
    ).length;

    const elToday = document.getElementById('kpiToday');
    const elNew = document.getElementById('kpiNew');
    const elTotal = document.getElementById('kpiTotal');
    const elBounce = document.getElementById('kpiBounce');

    if (elToday) elToday.textContent = String(todayCount);
    if (elNew) elNew.textContent = String(newCount);
    if (elTotal) elTotal.textContent = String(rows.length);
    if (elBounce) elBounce.textContent = String(bounceCount);

    const sideTotal = document.getElementById('sideCountTotal');
    if (sideTotal) sideTotal.textContent = String(rows.length);
  }

  function applyKeywordFilter() {
    const keyword = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
    if (!keyword) return [...rawData];

    return rawData.filter(row =>
      (row.name && String(row.name).toLowerCase().includes(keyword)) ||
      (row.phone && String(row.phone).toLowerCase().includes(keyword))
    );
  }

  function filterByName() {
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
      filteredData = applyKeywordFilter();
      renderTable();
    }, 150);
  }

  async function loadData() {
    const endpoint = currentViewMode === 'today' ? '/data-today' : '/data';
    const res = await fetch(`${endpoint}?_=${Date.now()}`);

    if (!res.ok) {
      const text = await res.text();
      throw new Error(text || `โหลดข้อมูลไม่สำเร็จ (${res.status})`);
    }

    const data = await res.json();
    rawData = Array.isArray(data) ? data : [];

    const seenIds = new Set(getSeenIds());
    const activeNewIds = new Set(getActiveNewIds());
    const isFirstLoad = isFirstLoadByMode[currentViewMode];
    let newCount = 0;

    rawData.forEach(row => {
      const rowId = Number(row.id);

      if (!isFirstLoad && rowId && !seenIds.has(rowId)) {
        activeNewIds.add(rowId);
      }

      row.__isNew = !!(rowId && activeNewIds.has(rowId));
      if (row.__isNew) newCount++;
    });

    updateNewBanner(newCount);

    const merged = new Set([
      ...seenIds,
      ...rawData.map(r => Number(r.id)).filter(Boolean)
    ]);
    saveSeenIds([...merged]);
    saveActiveNewIds([...activeNewIds]);

    isFirstLoadByMode[currentViewMode] = false;

    filteredData = applyKeywordFilter();
    calcKpis(rawData, newCount);
  }

  function renderTable() {
    const tbody = document.querySelector('#data-table tbody');
    tbody.innerHTML = '';

    const rows = filteredData;

    rows.forEach(row => {
      const createdAtFormatted = formatDate(row.created_at);
      const bounced = (row.status === 'รอแอดมินหลัก') || (Number(row.dept_accept) === 0);
      const bounceFrom = bounced ? (row.routed_to || '-') : '-';
      const bounceCell = bounced
        ? `<span class="chip bounce">ตีกลับ: ${escapeHtml(bounceFrom)}</span>`
        : '-';

      const tr = document.createElement('tr');
      tr.setAttribute('data-row-id', row.id);

      if (row.__isNew) tr.classList.add('row-new');

      tr.innerHTML = `
        <td>
          ${escapeHtml(row.name || '-')}
          ${row.__isNew ? '<span class="new-badge">ใหม่</span>' : ''}
        </td>
        <td>${escapeHtml(row.phone || '-')}</td>
        <td>${escapeHtml(row.status || 'รอแอดมินตรวจสอบ')}</td>
        <td>${bounceCell}</td>
        <td>${buildMapLink(row)}</td>
        <td>${createdAtFormatted}</td>
        <td>
          <button class="btn ghost" type="button" onclick="openDetailById(${Number(row.id)})">ดูรายละเอียด</button>
        </td>
      `;

      tbody.appendChild(tr);
    });

    if (rows.length === 0) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td colspan="7" style="padding:20px; color:#64748b; font-weight:900; text-align:center;">
          ${currentViewMode === 'today' ? '📅 วันนี้ยังไม่มีคำร้องใหม่' : '📭 ไม่มีข้อมูลคำร้องใหม่'}
        </td>
      `;
      tbody.appendChild(tr);
    }
  }

  function removeRowFromTable(id) {
    const tr = document.querySelector(`tr[data-row-id="${id}"]`);
    if (tr) tr.remove();

    rawData = rawData.filter(r => String(r.id) !== String(id));
    filteredData = filteredData.filter(r => String(r.id) !== String(id));

    renderTable();
    calcKpis(rawData, rawData.filter(r => r.__isNew).length);
  }

  async function safeLoadData() {
    if (isLoading) return;
    isLoading = true;
    try {
      await loadData();
      renderTable();
      setLastUpdated();
    } catch (e) {
      console.error('Auto refresh error:', e);
    } finally {
      isLoading = false;
    }
  }

  function startAutoRefresh(ms = 15000) {
    stopAutoRefresh();
    autoTimer = setInterval(() => {
      const toggle = document.getElementById('auto-refresh-toggle');
      if (!toggle || toggle.checked) safeLoadData();
    }, ms);
  }

  function stopAutoRefresh() {
    if (autoTimer) clearInterval(autoTimer);
    autoTimer = null;
  }

  function manualRefresh() {
    safeLoadData();
  }

  function buildDeptOptions(row) {
    const bounced = (row.status === 'รอแอดมินหลัก') || (Number(row.dept_accept) === 0);
    const blockedDepartment = bounced && row.routed_to ? String(row.routed_to).trim() : '';
    const current = row.department || '';

    const options = [
      { v: 'สำนักงานปลัด', t: 'สำนักงานปลัด' },
      { v: 'สาธารณสุข', t: 'สาธารณสุข' },
      { v: 'กองช่าง', t: 'กองช่าง' },
      { v: 'ไฟฟ้า', t: 'ไฟฟ้า' },
      { v: 'อื่นๆ', t: 'อื่นๆ' }
    ];

    const html = ['<option value="">เลือกแผนก</option>']
      .concat(
        options.map(opt => {
          const disabled = blockedDepartment === opt.v ? 'disabled' : '';
          const selected = current === opt.v ? 'selected' : '';
          const label = blockedDepartment === opt.v ? `${opt.t} (ตีกลับแล้ว)` : opt.t;
          return `<option value="${opt.v}" ${selected} ${disabled}>${label}</option>`;
        })
      )
      .join('');

    return html;
  }

  function renderDetailFiles(files) {
    const box = document.getElementById('detailFilesBox');
    if (!box) return;

    const safeFiles = (files || []).filter(it => {
      const url = normalizeFileUrl(it);
      return !!url;
    });

    if (!safeFiles.length) {
      box.innerHTML = `<div class="mini-muted">ไม่มีไฟล์แนบ</div>`;
      return;
    }

    box.innerHTML = `
      <div class="file-box">
        <div class="file-meta">ทั้งหมด ${safeFiles.length} ไฟล์</div>
        <button class="btn ghost" type="button" onclick='showImages(${JSON.stringify(safeFiles)})'>ดูทั้งหมด</button>
      </div>
    `;
  }

  function openDetailById(id) {
    const row = rawData.find(x => String(x.id) === String(id));
    if (!row) return;

    currentDetailId = Number(id);

    removeFromActiveNewIds(currentDetailId);
    rawData = rawData.map(r => (String(r.id) === String(currentDetailId)) ? ({ ...r, __isNew: false }) : r);
    filteredData = filteredData.map(r => (String(r.id) === String(currentDetailId)) ? ({ ...r, __isNew: false }) : r);

    document.getElementById('detailName').textContent = row.name || '-';
    document.getElementById('detailPhone').textContent = row.phone || '-';
    document.getElementById('detailDate').textContent = formatDate(row.created_at);
    document.getElementById('detailMap').innerHTML = buildMapLink(row);
    document.getElementById('detailMessage').textContent = row.message || '-';
    document.getElementById('detailSub').textContent = `ID: ${row.id} • โหมด: ${currentViewMode === 'today' ? 'วันนี้' : 'ทั้งหมด'}`;

    const bounced = (row.status === 'รอแอดมินหลัก') || (Number(row.dept_accept) === 0);
    const bounceFrom = bounced ? (row.routed_to || '-') : '-';
    const bounceReason = bounced ? (row.dept_reason || '-') : '-';

    const bounceWrap = document.getElementById('detailBounceWrap');
    const bounceEl = document.getElementById('detailBounce');

    if (bounced) {
      bounceWrap.style.display = 'block';
      bounceEl.innerHTML = `
        <div class="chip bounce" style="margin-bottom:8px;">ตีกลับจาก: ${escapeHtml(bounceFrom)}</div>
        <div class="mini-muted" style="color:#991b1b;">เหตุผล: ${escapeHtml(bounceReason)}</div>
      `;
    } else {
      bounceWrap.style.display = 'none';
      bounceEl.textContent = '-';
    }

    const deptSelect = document.getElementById('detailDeptSelect');
    deptSelect.innerHTML = buildDeptOptions(row);

    toggleApproveButton(currentDetailId);

    const files = normalizeFiles(row);
    renderDetailFiles(files);

    document.getElementById('detailModal').style.display = 'flex';

    renderTable();
    calcKpis(rawData, rawData.filter(r => r.__isNew).length);
  }

  function hideDetailModal() {
    document.getElementById('detailModal').style.display = 'none';
    currentDetailId = null;
  }

  function closeDetailModal(e) {
    if (e && e.target && e.target.id !== 'detailModal') return;
    hideDetailModal();
  }

  function toggleApproveButton() {
    const approveBtn = document.getElementById('approve-btn-detail');
    const deptSelect = document.getElementById('detailDeptSelect');
    if (!approveBtn || !deptSelect) return;
    approveBtn.disabled = !deptSelect.value;
  }

  async function approve(id) {
    try {
      const deptSelect = document.getElementById('detailDeptSelect');
      const department = deptSelect ? deptSelect.value : '';

      if (!department) {
        alert('กรุณาเลือกแผนกก่อนอนุมัติ');
        return;
      }

      const deptRes = await fetch(`/set-department/${id}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ department })
      });

      const deptData = await deptRes.json();

      if (!deptRes.ok) {
        alert(deptData.message || 'เปลี่ยนแผนกไม่สำเร็จ');
        return;
      }

      const approveRes = await fetch(`/approve/${id}`, {
        method: 'POST'
      });

      const approveText = await approveRes.text();
      alert(approveText || 'อนุมัติสำเร็จ');

      removeFromActiveNewIds(id);
      hideDetailModal();
      removeRowFromTable(id);

      setTimeout(() => {
        safeLoadData();
      }, 200);
    } catch (err) {
      console.error('approve error:', err);
      alert('เกิดข้อผิดพลาดในการอนุมัติ');
    }
  }

  function showImages(images) {
    const safeImages = (images || []).filter(img => {
      const rawUrl = typeof img === 'string' ? img : (img?.url || '');
      return !!rawUrl;
    });

    const itemsHtml = safeImages.map((img, index) => {
      const rawUrl = typeof img === 'string' ? img : (img?.url || '');
      const url = encodeURI(rawUrl);
      const isVideo = isVideoFile(img);

      const mediaHtml = isVideo
        ? `
          <video controls preload="metadata" class="preview-media">
            <source src="${url}">
            เบราว์เซอร์ไม่รองรับวิดีโอ
          </video>
        `
        : `
          <img src="${url}" loading="lazy" class="preview-media" alt="ไฟล์แนบ ${index + 1}" />
        `;

      return `
        <div class="media-card">
          <div class="media-link" onclick='openMediaViewer(${JSON.stringify({ url, isVideo, index: index + 1 })})' title="เปิดไฟล์เต็ม">
            ${mediaHtml}
          </div>
          <div class="media-meta">
            <span class="media-index">ไฟล์ที่ ${index + 1}</span>
            <div class="media-actions">
              <button type="button" class="open-btn" onclick='openMediaViewer(${JSON.stringify({ url, isVideo, index: index + 1 })})'>
                เปิดเต็ม
              </button>
            </div>
          </div>
        </div>
      `;
    }).join('');

    const win = window.open('', '_blank', 'width=1200,height=800');

    if (!win) {
      alert('เบราว์เซอร์บล็อก popup กรุณาอนุญาต popup ก่อน');
      return;
    }

    win.document.write(`
      <!DOCTYPE html>
      <html lang="th">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>ดูไฟล์ทั้งหมด</title>
        <style>
          * { box-sizing: border-box; }
          body {
            margin: 0;
            font-family: sans-serif;
            background: #f1f5f9;
            color: #0f172a;
          }
          .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
          }
          .title { font-size: 18px; font-weight: 900; margin: 0; }
          .count-badge {
            background: #0b2a4a;
            color: #fff;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 900;
          }
          .container { padding: 16px; max-width: 1400px; margin: 0 auto; }
          .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            align-items: start;
          }
          .media-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
          }
          .media-link {
            display: block;
            text-decoration: none;
            background: #f8fafc;
            cursor: pointer;
          }
          .preview-media {
            display: block;
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #e2e8f0;
          }
          .media-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
          }
          .media-index {
            font-size: 13px;
            color: #475569;
            font-weight: 900;
          }
          .open-btn {
            border: none;
            background: #2563eb;
            color: #fff;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
          }
          .media-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
          }
          .empty {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-weight: 900;
          }
          @media (max-width: 640px) {
            .container { padding: 12px; }
            .grid { grid-template-columns: 1fr; gap: 12px; }
            .preview-media { height: 220px; }
            .title { font-size: 16px; }
          }
        </style>
      </head>
      <body>
        <div class="topbar">
          <h1 class="title">🖼️ ดูไฟล์ทั้งหมด</h1>
          <div class="count-badge">ทั้งหมด ${safeImages.length} ไฟล์</div>
        </div>
        <div class="container">
          ${safeImages.length ? `<div class="grid">${itemsHtml}</div>` : `<div class="empty">ไม่มีไฟล์ให้แสดง</div>`}
        </div>
      </body>
      </html>
    `);

    win.document.close();
  }

  function openRejectReasonModal(id) {
    currentRejectId = id;
    document.getElementById('reject-reason').value = '';
    document.getElementById('reject-modal').style.display = 'flex';
  }

  function closeRejectModal() {
    document.getElementById('reject-modal').style.display = 'none';
  }

  function closeRejectModalByBackdrop(e) {
    if (e && e.target && e.target.id !== 'reject-modal') return;
    closeRejectModal();
  }

  async function submitReject() {
    const reason = document.getElementById('reject-reason').value.trim();
    if (!reason) {
      alert('กรุณากรอกเหตุผลก่อนส่ง');
      return;
    }

    const rejectId = currentRejectId;

    try {
      const res = await fetch(`/reject/${rejectId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason })
      });

      if (res.redirected) {
        window.location.href = res.url;
        return;
      } else {
        const text = await res.text();
        alert(text);
      }

      closeRejectModal();
      hideDetailModal();
      removeFromActiveNewIds(rejectId);
      removeRowFromTable(rejectId);

      setTimeout(() => {
        safeLoadData();
      }, 200);
    } catch (err) {
      console.error('submitReject error:', err);
      alert('เกิดข้อผิดพลาดในการไม่อนุมัติ');
    }
  }

  window.addEventListener('load', () => {
    updateViewModeUI();
    safeLoadData();
    startAutoRefresh(15000);

    const toggle = document.getElementById('auto-refresh-toggle');
    if (toggle) {
      toggle.addEventListener('change', () => {
        if (!toggle.checked) {
          stopAutoRefresh();
        } else {
          startAutoRefresh(15000);
        }
      });
    }
  });
</script>
</body>
</html>
