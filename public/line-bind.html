<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ผูกบัญชี LINE</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    @font-face{
      font-family:"THSarabunNew";
      src:url("/fonts/THSarabunNew.woff2") format("woff2");
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }
    @font-face{
      font-family:"THSarabunNew";
      src:url("/fonts/THSarabunNew Bold.woff2") format("woff2");
      font-weight:700;
      font-style:normal;
      font-display:swap;
    }
    @font-face{
      font-family:"THSarabunNew";
      src:url("/fonts/THSarabunNew Italic.woff2") format("woff2");
      font-weight:400;
      font-style:italic;
      font-display:swap;
    }
    @font-face{
      font-family:"THSarabunNew";
      src:url("/fonts/THSarabunNew BoldItalic.woff2") format("woff2");
      font-weight:700;
      font-style:italic;
      font-display:swap;
    }

    :root{
      --bg:#eef4f2;
      --card:#ffffff;
      --ink:#0f172a;
      --muted:#64748b;
      --line:#06c755;
      --border:#dbe4ea;
      --shadow:0 18px 42px rgba(2, 6, 23, .10);
      --radius:24px;
      --ok-bg:#ecfdf3;
      --ok-text:#15803d;
      --warn-bg:#fffbeb;
      --warn-text:#b45309;
      --err-bg:#fef2f2;
      --err-text:#b91c1c;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      min-height:100%;
    }

    body{
      font-family:"THSarabunNew", system-ui, -apple-system, sans-serif;
      background:var(--bg);
      color:var(--ink);
      padding:24px 14px;
    }

    .card{
      max-width:620px;
      margin:30px auto;
      background:var(--card);
      border-radius:var(--radius);
      padding:28px 22px 24px;
      box-shadow:var(--shadow);
      border:1px solid rgba(219, 228, 234, .9);
    }

    h1{
      margin:0 0 10px;
      color:#15803d;
      font-size:42px;
      line-height:1.1;
      font-weight:700;
      letter-spacing:.2px;
      text-align:center;
    }

    p{
      color:#475569;
      line-height:1.45;
      font-size:28px;
      margin:0 0 16px;
      text-align:center;
    }

    input{
      width:100%;
      padding:16px 18px;
      border:1px solid #cfd8df;
      border-radius:18px;
      font-size:30px;
      font-family:"THSarabunNew", system-ui, sans-serif;
      margin-top:12px;
      outline:none;
      transition:border-color .15s ease, box-shadow .15s ease;
      background:#fff;
    }

    input:focus{
      border-color:#86efac;
      box-shadow:0 0 0 4px rgba(34,197,94,.14);
    }

    button{
      width:100%;
      margin-top:16px;
      padding:16px 18px;
      border:none;
      border-radius:18px;
      background:var(--line);
      color:#fff;
      font-size:32px;
      line-height:1.1;
      font-weight:700;
      font-family:"THSarabunNew", system-ui, sans-serif;
      cursor:pointer;
      transition:transform .06s ease, opacity .2s ease;
    }

    button:active{
      transform:scale(.99);
    }

    button:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .status{
      margin-top:16px;
      padding:14px 16px;
      border-radius:16px;
      display:none;
      white-space:pre-line;
      font-size:26px;
      line-height:1.35;
    }

    .status.ok{
      background:var(--ok-bg);
      color:var(--ok-text);
    }

    .status.warn{
      background:var(--warn-bg);
      color:var(--warn-text);
    }

    .status.err{
      background:var(--err-bg);
      color:var(--err-text);
    }

    .muted{
      font-size:24px;
      color:#64748b;
      margin-top:12px;
      text-align:center;
      line-height:1.4;
    }

    .success-modal{
      position:fixed;
      inset:0;
      background:rgba(15, 23, 42, .45);
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      z-index:9999;
    }

    .success-modal.show{
      display:flex;
    }

    .success-box{
      width:min(460px, 100%);
      background:#ffffff;
      border-radius:26px;
      padding:28px 22px 22px;
      box-shadow:0 24px 60px rgba(2, 6, 23, .22);
      text-align:center;
      animation:popIn .18s ease-out;
    }

    .success-icon{
      font-size:60px;
      line-height:1;
      margin-bottom:8px;
    }

    .success-title{
      font-size:40px;
      font-weight:700;
      color:#15803d;
      margin-bottom:8px;
      line-height:1.1;
    }

    .success-text{
      color:#475569;
      line-height:1.4;
      font-size:28px;
      margin-bottom:18px;
      white-space:pre-line;
    }

    .success-btn{
      width:100%;
      border:none;
      border-radius:18px;
      background:var(--line);
      color:#fff;
      font-size:30px;
      font-weight:700;
      font-family:"THSarabunNew", system-ui, sans-serif;
      padding:14px 16px;
      cursor:pointer;
      margin-top:0;
    }

    @keyframes popIn{
      from{
        opacity:0;
        transform:scale(.94);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔗 ผูกบัญชี LINE</h1>
    <p>กรอกเบอร์โทรที่ใช้ส่งคำร้อง แล้วกดปุ่มด้านล่างเพื่อผูกบัญชี LINE ของคุณกับระบบ</p>

    <input id="phone" type="tel" inputmode="numeric" maxlength="10" placeholder="เช่น 0812345678" oninput="this.value=this.value.replace(/\D/g,'').slice(0,10)" />

    <div style="margin-top:8px; text-align:right;">
    <button
        type="button"
        onclick="clearSavedPhone()"
        style="width:auto; margin-top:0; padding:8px 14px; font-size:24px; background:#e2e8f0; color:#0f172a;"
    >
        ล้างเบอร์ที่จำไว้
    </button>
    </div>

    <button id="bindBtn" onclick="bindAccount()">ยืนยันผูกบัญชี</button>

    <div id="status" class="status"></div>
    <div class="muted" id="liffInfo">กำลังเชื่อมต่อ LINE...</div>
  </div>

  <div id="successModal" class="success-modal">
    <div class="success-box">
      <div class="success-icon" id="modalIcon">✅</div>
      <div class="success-title" id="modalTitle">ผูกบัญชีสำเร็จ</div>
      <div class="success-text" id="modalText">จากนี้คุณจะได้รับแจ้งเตือนสถานะคำร้องผ่าน LINE</div>
      <button class="success-btn" onclick="closeSuccessModal()">ตกลง</button>
    </div>
  </div>

  <script>
    const LIFF_ID = "2009275648-vSO7porW";
    const PHONE_STORAGE_KEY = "userPhone";
    let lineUserId = null;
    let shouldCloseAfterModal = false;

function normalizePhoneInput(value = "") {
  return String(value).replace(/\D/g, "").slice(0, 10);
}
function clearSavedPhone() {
  localStorage.removeItem(PHONE_STORAGE_KEY);
  document.getElementById("phone").value = "";
  setStatus("🧹 ล้างเบอร์ที่จำไว้แล้ว", "warn");
}
    function setStatus(message, type = "") {
      const box = document.getElementById("status");
      box.style.display = "block";
      box.className = "status " + type;
      box.textContent = message;
    }

    function clearStatus() {
      const box = document.getElementById("status");
      box.style.display = "none";
      box.className = "status";
      box.textContent = "";
    }

    function showSuccessModal({ icon = "✅", title = "สำเร็จ", text = "", closeAfter = false } = {}) {
        document.getElementById("modalIcon").textContent = icon;
        document.getElementById("modalTitle").textContent = title;
        document.getElementById("modalText").textContent = text;
        shouldCloseAfterModal = closeAfter;

        const modal = document.getElementById("successModal");
        if (modal) modal.classList.add("show");

        if (closeAfter) {
            setTimeout(() => {
            closeSuccessModal();
            }, 1500);
        }
        }

    function closeSuccessModal() {
        const modal = document.getElementById("successModal");
        if (modal) modal.classList.remove("show");

        if (!shouldCloseAfterModal) return;

        try {
            if (window.liff && liff.isInClient()) {
            liff.closeWindow();
            return;
            }
        } catch (e) {
            console.error("closeWindow error:", e);
        }

        // fallback
        window.location.href = "https://line.me/R/oaMessage/@300ifqgu";
        }

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        lineUserId = profile.userId;

        const savedPhone = localStorage.getItem(PHONE_STORAGE_KEY) || "";
        if (savedPhone) {
        document.getElementById("phone").value = normalizePhoneInput(savedPhone);
        }

        document.getElementById("liffInfo").textContent = "เชื่อมต่อ LINE สำเร็จแล้ว";
      } catch (err) {
        console.error(err);
        setStatus("❌ เปิดหน้า LIFF ไม่สำเร็จ\n" + (err.message || err), "err");
        document.getElementById("liffInfo").textContent = "เชื่อมต่อ LINE ไม่สำเร็จ";
      }
    }

    async function bindAccount() {
      const phoneInput = document.getElementById("phone");
      const phone = (phoneInput.value || "").replace(/\D/g, "").trim();
      const btn = document.getElementById("bindBtn");

      clearStatus();

      if (!/^0\d{9}$/.test(phone)) {
        setStatus("❌ กรุณากรอกเบอร์โทร 10 หลัก และขึ้นต้นด้วย 0", "err");
        return;
      }

      if (!lineUserId) {
        setStatus("❌ ยังไม่พบ LINE user กรุณาลองเปิดหน้านี้จากใน LINE อีกครั้ง", "err");
        return;
      }

      btn.disabled = true;

      try {
        const res = await fetch("/api/line/bind-phone", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone, lineUserId })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "ผูกบัญชีไม่สำเร็จ");
        }

        // เคยผูกแล้ว
        localStorage.setItem(PHONE_STORAGE_KEY, phone);
        if (data.code === "ALREADY_LINKED") {
          showSuccessModal({
            icon: "ℹ️",
            title: "เคยผูกบัญชีแล้ว",
            text: data.message || "บัญชีนี้ผูกกับเบอร์นี้อยู่แล้ว",
            closeAfter: true
          });
          return;
        }

        // อัปเดตการผูก
        if (data.code === "LINK_UPDATED") {
          showSuccessModal({
            icon: "🔄",
            title: "อัปเดตการผูกบัญชีสำเร็จ",
            text: data.message || "ระบบอัปเดตการผูกบัญชี LINE ให้เรียบร้อยแล้ว",
            closeAfter: true
          });
          return;
        }

        // ผูกครั้งแรก
        showSuccessModal({
          icon: "✅",
          title: "ผูกบัญชีสำเร็จ",
          text: data.message || "จากนี้คุณจะได้รับแจ้งเตือนสถานะคำร้องผ่าน LINE",
          closeAfter: true
        });

      } catch (err) {
        console.error(err);
        setStatus("❌ " + (err.message || "ผูกบัญชีไม่สำเร็จ"), "err");
      } finally {
        btn.disabled = false;
      }
    }

    initLiff();
  </script>
</body>
</html>
