<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ส่งคำร้องสำเร็จ</title>

  <style>
    :root{
      --bg:#dff7ee;
      --card:#ffffff;
      --ink:#0f172a;
      --muted:#64748b;
      --green:#16a34a;
      --green2:#22c55e;
      --line:#06c755;
      --border:#e2e8f0;
      --shadow: 0 20px 50px rgba(2, 6, 23, .10);
      --radius: 18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Kanit", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px 12px;
    }
    .wrap{
      width: min(520px, 100%);
    }
    .card{
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      border: 1px solid rgba(226,232,240,.8);
    }
    .title{
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:center;
      margin: 6px 0 10px;
      color: #166534;
      font-weight: 900;
      font-size: 26px;
    }
    .subtitle{
      text-align:center;
      color: var(--muted);
      line-height:1.5;
      margin:0 0 14px;
      font-size: 15px;
    }
    .pill{
      margin: 10px auto 14px;
      display:flex;
      justify-content:center;
    }
    .pill span{
      background:#e8f7ee;
      border:1px solid #bfead0;
      color:#166534;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 14px;
    }

    .section{
      margin-top: 14px;
      border: 1px solid #bfead0;
      background: #eefcf5;
      border-radius: 16px;
      padding: 14px;
    }
    .section h2{
      margin:0 0 8px;
      font-size: 16px;
      font-weight: 900;
      color:#14532d;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .muted{ color: var(--muted); font-size: 14px; line-height:1.45; }
    .btn{
      width:100%;
      border:none;
      border-radius: 14px;
      padding: 14px 14px;
      font-weight: 900;
      cursor:pointer;
      font-size: 16px;
      margin-top: 10px;
      transition: transform .06s ease;
    }
    .btn:active{ transform: scale(.99); }
    .btn-line{ background: var(--line); color: #fff; }
    .btn-green{ background: var(--green); color:#fff; }
    .btn-gray{ background:#e2e8f0; color:#0f172a; }

    .editBox{
      display:none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #bfead0;
    }
    .input{
      width:100%;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 16px;
      outline:none;
      background:#fff;
    }

    .footer{
      margin-top: 14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .footer .btn{
      margin-top:0;
      flex:1;
      min-width: 180px;
    }

    .warn{
      margin-top:10px;
      padding:10px 12px;
      border-radius: 12px;
      background:#fff7ed;
      border:1px solid #fed7aa;
      color:#9a3412;
      font-size: 13px;
      line-height:1.45;
      display:none;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="title">✅ ส่งคำร้องสำเร็จ</div>
      <p class="subtitle">
        ขอบคุณสำหรับการแจ้งเรื่อง<br/>
        เจ้าหน้าที่จะดำเนินการโดยเร็ว
      </p>

      <div class="pill" id="ridWrap" style="display:none;">
        <span>เลขคำร้อง: <b id="rid">-</b></span>
      </div>

      <!-- LINE Section -->
      <div class="section" id="lineSection">
        <h2>🔔 รับแจ้งเตือนผ่าน LINE</h2>
        <div class="muted">
          ยืนยันเบอร์สำหรับรับแจ้งเตือน: <b id="phoneMasked">-</b>
        </div>

        <button class="btn btn-line" id="btnBindNow">✅ ผูกบัญชี LINE ด้วยเบอร์นี้</button>
        <button class="btn btn-gray" id="btnEditPhone">✏️ แก้เบอร์</button>

        <div class="editBox" id="editPhoneBox">
          <div class="muted" style="margin-bottom:6px;">กรอกเบอร์ใหม่ (10 หลัก)</div>
          <input class="input" id="newPhone" inputmode="numeric" maxlength="10" placeholder="0xxxxxxxxx" />
          <button class="btn btn-green" id="btnSavePhone">บันทึกเบอร์ใหม่</button>
        </div>

        <div class="muted" style="margin-top:10px; opacity:.9;">
          * กด “ผูกบัญชี LINE” ระบบจะเปิดหน้าผูกบัญชีให้ จากนั้นตรวจสอบเบอร์แล้วกดยืนยันได้เลย
        </div>

        <div class="warn" id="warnBox"></div>
      </div>

      <div class="footer">
        <button class="btn btn-green" onclick="location.href='/'">⬅️ กลับไปเมนูหลัก</button>
      </div>
    </div>
  </div>

  <script>
    // ✅ LIFF URL สำหรับผูกบัญชี LINE
    const LIFF_BIND_URL = "https://liff.line.me/2009275648-vSO7porW";
    const OA_ADD_LINK = "https://line.me/R/ti/p/@300ifqgu";

    const params = new URLSearchParams(location.search);
    const rid = params.get('rid');
    const token = params.get('t');

    const ridWrap = document.getElementById('ridWrap');
    const ridEl = document.getElementById('rid');
    const phoneMaskedEl = document.getElementById('phoneMasked');
    const lineSection = document.getElementById('lineSection');
    const editBox = document.getElementById('editPhoneBox');
    const warnBox = document.getElementById('warnBox');

    if (rid) {
      ridWrap.style.display = 'flex';
      ridEl.textContent = rid;
    }

    function showWarn(msg){
      warnBox.style.display = 'block';
      warnBox.textContent = msg;
    }

    async function loadBindInfo(){
      if (!token) {
        showWarn('ไม่พบโค้ดผูก LINE (token) กรุณาส่งคำร้องใหม่อีกครั้ง');
        phoneMaskedEl.textContent = '-';
        return;
      }

      try{
        const r = await fetch(`/line/bind-info?t=${encodeURIComponent(token)}`);
        const data = await r.json();

        if (!data.ok){
          if (r.status === 410) showWarn('โค้ดหมดอายุแล้ว กรุณาส่งคำร้องใหม่หรือกลับไปหน้าเดิมเพื่อสร้างใหม่');
          else showWarn('ไม่พบโค้ดผูก LINE กรุณาส่งคำร้องใหม่อีกครั้ง');
          phoneMaskedEl.textContent = '-';
          return;
        }

        phoneMaskedEl.textContent = data.phoneMasked || '-';

        // ถ้าผูกแล้ว ซ่อนกล่องนี้ไปเลย
        if (data.linked) {
          lineSection.style.display = 'none';
        }
      }catch(e){
        console.error(e);
        showWarn('เกิดข้อผิดพลาดในการโหลดข้อมูลผูก LINE');
      }
    }

    function openLineBindPage(){
      window.open(LIFF_BIND_URL, '_blank');
    }

    document.getElementById('btnBindNow').addEventListener('click', openLineBindPage);

    const btnEditPhone = document.getElementById('btnEditPhone');

    btnEditPhone.addEventListener('click', () => {
      const isHidden = window.getComputedStyle(editBox).display === 'none';
      editBox.style.display = isHidden ? 'block' : 'none';
      btnEditPhone.textContent = isHidden ? '❌ ยกเลิกการแก้ไข' : '✏️ แก้เบอร์';
    });

    document.getElementById('btnSavePhone').addEventListener('click', async () => {
      const p = (document.getElementById('newPhone').value || '').replace(/\D/g,'').trim();
      if (!/^0\d{9}$/.test(p)) {
        alert('❌ กรุณากรอกเบอร์ 10 หลัก (ขึ้นต้นด้วย 0)');
        return;
      }

      try{
        const r = await fetch('/line/update-phone', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ t: token, phone: p })
        });
        const data = await r.json();
        if (!data.ok) {
          alert('❌ บันทึกไม่สำเร็จ');
          return;
        }
        localStorage.setItem('userPhone', p);
        phoneMaskedEl.textContent = data.phoneMasked || '-';
        editBox.style.display = 'none';
        alert('✅ อัปเดตเบอร์แล้ว');
      }catch(e){
        console.error(e);
        alert('❌ เกิดข้อผิดพลาด');
      }
    });

    loadBindInfo();
  </script>
</body>
</html>
