<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ส่งคำร้อง - อบต.ท่าช้าง</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');

    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --secondary: #6366f1;
      --accent: #f43f5e;
      --success: #10b981;
      --bg-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      --card-bg: rgba(255, 255, 255, 0.95);
      --text-main: #1e293b;
      --text-muted: #64748b;
      --radius-lg: 24px;
      --radius-md: 16px;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: 'Kanit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 100px;
    }

    /* --- Header Section --- */
    .app-header {
      text-align: center;
      margin-bottom: 24px;
      padding: 20px 0;
    }

    .logo-wrapper {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: var(--shadow);
    }

    .logo-wrapper img { width: 55px; }

    .app-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
      color: var(--primary-dark);
    }

    .app-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    /* --- Card Style --- */
    .form-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .section-head i {
      width: 40px;
      height: 40px;
      background: #e0f2fe;
      color: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .section-head h2 {
      font-size: 1.1rem;
      margin: 0;
      font-weight: 600;
    }

    /* --- Inputs --- */
    .input-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-main);
    }

    input, select, textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      border: 1.5px solid #e2e8f0;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s;
      background: #f8fafc;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
    }

    /* --- Special UI Elements --- */
    #map {
      height: 200px;
      border-radius: var(--radius-md);
      margin-bottom: 12px;
      border: 1px solid #e2e8f0;
    }

    .file-upload-zone {
      border: 2px dashed #cbd5e1;
      border-radius: var(--radius-md);
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f8fafc;
    }

    .file-upload-zone:active { background: #f1f5f9; border-color: var(--primary); }

    .file-upload-zone i {
      font-size: 2rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* --- Floating Navigation / Actions --- */
    .bottom-actions {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
      box-shadow: 0 -10px 20px rgba(0,0,0,0.05);
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      z-index: 1000;
    }

    .btn {
      border-radius: var(--radius-md);
      padding: 16px;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary { background: var(--primary); color: white; }
    .btn-outline { background: white; border: 1.5px solid #e2e8f0; color: var(--text-main); }
    .btn-location { background: var(--secondary); color: white; margin-bottom: 10px; width: 100%; }

    /* --- Status Badge --- */
    .status-badge {
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 99px;
      background: #f1f5f9;
      color: var(--text-muted);
      display: inline-block;
      margin-top: 5px;
    }
    .status-badge.ok { background: #dcfce7; color: #166534; }

  </style>
</head>
<body>

  <div class="container">
    <header class="app-header">
      <div class="logo-wrapper">
        <img src="your-logo.png" alt="Logo">
      </div>
      <h1>อบต.ท่าช้าง</h1>
      <p>แจ้งเรื่องร้องทุกข์เพื่อพัฒนาชุมชน</p>
    </header>

    <form id="complaintForm">
      <div class="form-card">
        <div class="section-head">
          <i class="fa-solid fa-user-pen"></i>
          <h2>ข้อมูลผู้แจ้ง</h2>
        </div>
        
        <div class="input-group">
          <label>ชื่อ-นามสกุล</label>
          <input type="text" name="name" placeholder="ระบุชื่อของคุณ" required>
        </div>

        <div class="input-group">
          <label>เบอร์โทรศัพท์ติดต่อ</label>
          <input type="tel" name="phone" id="userPhoneDisplay" readonly style="background: #f1f5f9; color: #64748b;">
          <span class="status-badge">✓ ยืนยันตัวตนแล้ว</span>
        </div>

        <div class="input-group">
          <label>หมวดหมู่ที่ต้องการแจ้ง</label>
          <select name="category" required>
            <option value="" disabled selected>กรุณาเลือกประเภท</option>
            <option value="ขยะ">🗑️ จัดการขยะ / สิ่งปฏิกูล</option>
            <option value="ไฟฟ้า">💡 ไฟฟ้าสาธารณะดับ/ชำรุด</option>
            <option value="ถนน/เสาไฟชำรุด">🛣️ ถนน / ทางเท้าชำรุด</option>
            <option value="อื่นๆ">❓ อื่นๆ</option>
          </select>
        </div>
      </div>

      <div class="form-card">
        <div class="section-head">
          <i class="fa-solid fa-file-text"></i>
          <h2>รายละเอียดเหตุการณ์</h2>
        </div>

        <div class="input-group">
          <label>สถานที่เกิดเหตุ / จุดสังเกต</label>
          <textarea name="address" rows="2" placeholder="เช่น ใกล้ร้านค้าหมู่ 4..." required></textarea>
        </div>

        <div class="input-group">
          <label>รายละเอียดปัญหา</label>
          <textarea name="message" rows="4" placeholder="อธิบายเหตุการณ์ที่เกิดขึ้น..." required></textarea>
        </div>
      </div>

      <div class="form-card">
        <div class="section-head">
          <i class="fa-solid fa-map-location-dot"></i>
          <h2>ระบุตำแหน่ง</h2>
        </div>
        
        <div id="map"></div>
        <button type="button" class="btn btn-location" onclick="useMyLocation()">
          <i class="fa-solid fa-crosshairs"></i> ใช้ตำแหน่งปัจจุบันของฉัน
        </button>
        <div id="mapStatus" class="status-badge">ยังไม่ได้ระบุตำแหน่ง (กรุณากดที่แผนที่)</div>

        <input type="hidden" name="latitude" id="latitude" required>
        <input type="hidden" name="longitude" id="longitude" required>
      </div>

      <div class="form-card">
        <div class="section-head">
          <i class="fa-solid fa-camera"></i>
          <h2>แนบรูปภาพ / วิดีโอ</h2>
        </div>

        <label for="mediaFiles" class="file-upload-zone">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <div style="font-weight: 600;">กดเพื่อเลือกรูปภาพ หรือ วิดีโอ</div>
          <div style="font-size: 0.8rem; color: #94a3b8; margin-top: 5px;">(สูงสุด 10 ไฟล์, รวมไม่เกิน 100MB)</div>
          <input type="file" id="mediaFiles" name="mediaFiles" multiple accept="image/*,video/*" style="display: none;">
        </label>
        <div id="fileSummary" class="status-badge" style="margin-top: 10px; display: block;">ยังไม่ได้เลือกไฟล์</div>
      </div>
    </form>

    <div class="bottom-actions">
      <button type="submit" form="complaintForm" class="btn btn-primary" id="submitBtn">
        <i class="fa-solid fa-paper-plane"></i> ส่งคำร้องขอความช่วยเหลือ
      </button>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button type="button" class="btn btn-outline" onclick="location.href='/track.html'">
          <i class="fa-solid fa-list-check"></i> ติดตามผล
        </button>
        <button type="button" class="btn btn-outline" onclick="logout()" style="color: var(--accent);">
          <i class="fa-solid fa-door-open"></i> ออก
        </button>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" style="display:none; position:fixed; inset:0; background:rgba(255,255,255,0.9); z-index:2000; flex-direction:column; align-items:center; justify-content:center;">
    <div class="logo-wrapper" style="animation: pulse 1.5s infinite;">
      <img src="your-logo.png" alt="Logo">
    </div>
    <p style="font-weight: 600; color: var(--primary-dark); margin-top: 15px;">กำลังนำส่งข้อมูลเข้าสู่ระบบ...</p>
  </div>

  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // --- รักษา Logic เดิมที่คุณเขียนไว้ แต่ปรับแต่งการแสดงผลเล็กน้อย ---
    document.addEventListener("DOMContentLoaded", () => {
      const phone = localStorage.getItem('userPhone') || '08x-xxx-xxxx';
      document.getElementById('userPhoneDisplay').value = phone;
    });

    const map = L.map('map').setView([12.616, 102.104], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    let marker = null;
    function setMarker(latlng) {
      if (marker) marker.setLatLng(latlng);
      else marker = L.marker(latlng).addTo(map);
      
      document.getElementById('latitude').value = latlng.lat.toFixed(6);
      document.getElementById('longitude').value = latlng.lng.toFixed(6);
      const status = document.getElementById('mapStatus');
      status.textContent = `📍 ปักหมุดแล้ว: ${latlng.lat.toFixed(4)}, ${latlng.lng.toFixed(4)}`;
      status.classList.add('ok');
    }

    map.on('click', (e) => setMarker(e.latlng));

    function useMyLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((p) => {
          const loc = { lat: p.coords.latitude, lng: p.coords.longitude };
          map.setView(loc, 16);
          setMarker(loc);
        });
      }
    }

    // ส่วนการจัดการไฟล์และส่งฟอร์ม (คง Logic เดิมของคุณไว้ทั้งหมด)
    const mediaInput = document.getElementById('mediaFiles');
    mediaInput.addEventListener('change', () => {
      const files = mediaInput.files;
      const summary = document.getElementById('fileSummary');
      if(files.length > 0) {
        summary.textContent = `📎 เลือกแล้ว ${files.length} ไฟล์`;
        summary.classList.add('ok');
      }
    });

    // ... (ฟังก์ชัน logout, submit, validation อื่นๆ ใช้ตัวเดิมที่คุณมีได้เลย) ...
  </script>
</body>
</html>
