<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เลือกแผนก - เสร็จสิ้น</title>

  <style>
    :root{
      --bg:#eef3fb;
      --card:#ffffff;
      --navy:#0b2a4a;
      --navy2:#133a63;
      --line:#dbe4f0;
      --ink:#0f172a;
      --muted:#64748b;
      --shadow:0 14px 35px rgba(2,6,23,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Kanit",sans-serif;
      background:
        radial-gradient(1000px 400px at 50% -20%, rgba(34,197,94,.10), transparent 60%),
        radial-gradient(700px 300px at 0% 0%, rgba(11,42,74,.10), transparent 55%),
        #eef3fb;
      color:var(--ink);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:30px 16px 40px;
    }

    .topbar{
      background:linear-gradient(135deg,#166534,#15803d);
      color:#fff;
      border-radius:22px;
      padding:22px 22px;
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }

    .topbar h1{
      margin:0;
      font-size:28px;
      font-weight:900;
    }

    .topbar p{
      margin:8px 0 0;
      opacity:.92;
      font-size:15px;
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .back-btn{
      display:inline-block;
      text-decoration:none;
      background:#fff;
      color:#166534;
      border:1px solid var(--line);
      padding:10px 14px;
      border-radius:12px;
      font-weight:800;
    }

    .section-title{
      font-size:20px;
      font-weight:900;
      color:#0f172a;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
    }

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:20px;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      gap:14px;
      min-height:180px;
    }

    .icon{
      width:60px;
      height:60px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      background:linear-gradient(135deg,#dcfce7,#bbf7d0);
      box-shadow:0 10px 20px rgba(34,197,94,.15);
    }

    .card h3{
      margin:0;
      font-size:22px;
      font-weight:900;
    }

    .card p{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.55;
      flex:1;
    }

    .go-btn{
      display:inline-block;
      text-align:center;
      text-decoration:none;
      background:linear-gradient(135deg,#16a34a,#15803d);
      color:#fff;
      padding:12px 14px;
      border-radius:12px;
      font-weight:900;
    }

    @media (max-width:640px){
      .topbar h1{font-size:22px}
      .card h3{font-size:20px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>✅ เลือกแผนกที่ต้องการดู</h1>
      <p>หน้ารายการ “เสร็จสิ้น” ของแต่ละแผนก</p>
    </div>

    <div class="toolbar">
      <div class="section-title">เลือกแผนก</div>
      <a href="/admin.html" class="back-btn">⬅ กลับหน้า Admin</a>
    </div>

    <div class="grid">
      <div class="card">
        <div class="icon">🏥</div>
        <h3>สาธารณสุข</h3>
        <p>ดูรายการคำร้องสถานะ “เสร็จสิ้น” ของแผนกสาธารณสุข</p>
        <a class="go-btn" href="/completed-health.html">ดูรายการ</a>
      </div>

      <div class="card">
        <div class="icon">⚡</div>
        <h3>ไฟฟ้า</h3>
        <p>ดูรายการคำร้องสถานะ “เสร็จสิ้น” ของแผนกไฟฟ้า</p>
        <a class="go-btn" href="/completed-electric.html">ดูรายการ</a>
      </div>

      <div class="card">
        <div class="icon">🛠️</div>
        <h3>กองช่าง</h3>
        <p>ดูรายการคำร้องสถานะ “เสร็จสิ้น” ของแผนกกองช่าง</p>
        <a class="go-btn" href="/completed-engineer.html">ดูรายการ</a>
      </div>
    </div>
  </div>
</body>
</html>
